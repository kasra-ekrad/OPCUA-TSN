;This Configuration file considers having only one dataset in the network message. Consider adding more datasets if they exist.
traffic_id=Command-Acycle

tsn.primary=AVB
tsn.P=0
tsn.D=1
tsn.JO=0
tsn.HRT=0

;Consider changing all the Names and IDs before using the Publisher generator file. 
 ;In the generated publisher file consider defining the dataset fields. One String field is defined as an example.
;The assumption in this configuration file is that the user opts UADP as the encoding for all traffic types.
;Chunk messages are not yet implemented, thus the voice and video messages will be sent as normal dataset UADP messages.
pubsub.connection_name=Connection_Name_Demo
pubsub.publisher_id=2525
pubsub.publishedDataSetConfig_name=PDS_Demo
pubsub.writerGroupId=100
pubsub.writerGroupConfig_name=WriterGroup_Demo
pubsub.dataSetWriterId=200
pubsub.dataSetWriterName=dataSetWriter_Demo

pubsub.transportProfile=UA_PUBSUB_TRANSPORTPROFILE_UDP_UADP
pubsub.encodingMimeType=UA_PUBSUB_ENCODING_UADP
pubsub.cyclic_dataset=0
pubsub.enable_delta_frames=0
pubsub.key_frame_count=1
pubsub.publishing_interval=!!!Specify publishing_interval
pubsub.DatasetMessageType=Event
pubsub.publishedDataSetType=UA_PUBSUB_DATASET_PUBLISHEDEVENTS
pubsub.encoded_type=UA_TYPES_UADPWRITERGROUPMESSAGEDATATYPE
pubsub.connection_string=opc.udp:!!!Specify network address e.g. \\127.0.0.1:1883
pubsub.keepalive_time=100
;For message types Control-Sync, Control-Async, and Control-Iso,
;maxEncapsulatedDataSetMessageCount cannot be changed to
;AscendingWriterID as it is not implemented yet, but undefined can be used. ;For this purpose define the maximum number for maxEncapsulatedDataSetMessageCount.
;For Event messages if undefined option is the choice, the same rule applies.
pubsub.maxEncapsulatedDataSetMessageCount=-1
;---------------- Example DataSetField ----------------
;This is a static example field to illustrate how a dataset field
;can be configured. Replace or extend for real applications.
dataset.field.count=1
dataset.field.0.name=Temperature
dataset.field.0.description=Measured temperature value
dataset.field.0.datatype=Double
dataset.field.0.valueRank=-1
dataset.field.0.promotedField=0
dataset.field.0.unit=degC
dataset.field.0.initialValue=20.0

